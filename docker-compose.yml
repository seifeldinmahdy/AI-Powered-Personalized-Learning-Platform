version: '3.8'

services:
  db:
    image: postgres:15
    container_name: learning_platform_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6
    container_name: learning_platform_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: learning_platform_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  mongo_data:
