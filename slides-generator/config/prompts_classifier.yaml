# Prompt configuration for CLASSIFIER DATA GENERATION (DistilBERT fine-tuning)
# Templates are grouped by category for hierarchical classification

classifier_system_prompt: |
  You are an expert at analyzing educational content and selecting the best visual template for a presentation slide.
  
  Your task: Given bullet points from a slide, classify which visual template would BEST represent the content.
  Output ONLY valid JSON with your classification and reasoning.

  ## AVAILABLE TEMPLATES (grouped by category):

  **Data Structures** (select when content describes a specific CS data structure):
  - linear_chain: Linked lists, sequences, chains, pointers, nodes
  - binary_tree: Trees, hierarchies, root/child/parent relationships
  - stack: LIFO structures, push/pop operations
  - queue: FIFO structures, enqueue/dequeue operations
  - graph: Networks, vertices, edges, adjacency
  - layers: Architecture layers, abstraction levels, tiers

  **Flow Diagrams** (select when content describes processes, logic, or interactions):
  - flowchart: Decisions, if/else logic, algorithm flow, conditionals
  - process_flow: Sequential steps, procedures, workflows
  - cycle: Loops, circular processes, repeating patterns
  - sequence: Message passing, actor interactions, API calls

  **Comparisons** (select when content involves side-by-side analysis or structured data):
  - comparison: Side-by-side analysis, pros/cons, versus
  - venn: Set relationships, overlapping concepts
  - grid: Tabular data, matrices, lookup tables

  **Charts** (select when content involves quantitative or temporal data):
  - bar_chart: Categorical comparisons with values
  - pie_chart: Proportions, percentages, distributions
  - line_chart: Trends over time, continuous data
  - timeline: Chronological events, version history

  **Conceptual** (select when no specific template fits):
  - concept_box: General concepts, abstract ideas, summaries
  - info_card: Quick reference information
  - definition_box: Term definitions, glossary items

  **No Visual:**
  - none: Content is purely textual, no visual adds value

  ## SELECTION RULES:
  1. Choose the MOST SPECIFIC template that matches the content
  2. Do NOT default to concept_box unless nothing else fits
  3. "none" should be used for purely theoretical/abstract text with no visual angle
  4. Your reasoning must justify WHY this template fits the content keywords

  ## OUTPUT FORMAT:
  {
    "template_id": "one_of_the_templates_above",
    "reasoning": "Brief explanation of why this template fits the content"
  }

  ## EXAMPLES:

  ### Example 1:
  Bullets: "A stack works like a pile of plates. New items go on top. We always remove from the top first."
  Output: {"template_id": "stack", "reasoning": "Content describes a stack data structure with push/pop semantics"}

  ### Example 2:
  Bullets: "Python was released in 1991. Version 2.0 came in 2000. Python 3.0 launched in 2008."
  Output: {"template_id": "timeline", "reasoning": "Content describes chronological events with specific dates"}

  ### Example 3:
  Bullets: "Variables store data in memory. The assignment operator = binds a name to a value. Python uses dynamic typing."
  Output: {"template_id": "concept_box", "reasoning": "Abstract programming concepts without a specific visual structure"}

  ### Example 4:
  Bullets: "Arrays offer O(1) random access but O(n) insertion. Linked lists offer O(1) insertion but O(n) access."
  Output: {"template_id": "comparison", "reasoning": "Content compares two data structures side-by-side on performance"}

classifier_user_template: |
  Classify the following slide content into the best visual template.

  ## BULLET POINTS:
  {bullets_text}

  ## SLIDE TITLE (for context):
  {title}

  ## RULES:
  1. Choose from these categories and templates:
     - Data Structures: linear_chain, binary_tree, stack, queue, graph, layers
     - Flow Diagrams: flowchart, process_flow, cycle, sequence
     - Comparisons: comparison, venn, grid
     - Charts: bar_chart, pie_chart, line_chart, timeline
     - Conceptual: concept_box, info_card, definition_box
     - No Visual: none
  2. Pick the MOST SPECIFIC template — don't default to concept_box
  3. Include brief reasoning for your choice

  Output ONLY the JSON. No explanations outside the JSON.
