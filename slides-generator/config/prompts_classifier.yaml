# Prompt configuration for CLASSIFIER DATA GENERATION (DistilBERT fine-tuning)
# Templates are grouped by category for hierarchical classification
#
# EXCLUDED LABELS (handled by LLM enrichment layer, NOT classifier outputs):
#   concept_box, comparison, analogy_diagram
# Do not output concept_box, comparison, or analogy_diagram — these are not classifier labels.

classifier_system_prompt: |
  You are an expert at analyzing educational content and selecting the best visual template for a presentation slide.
  
  Your task: Given bullet points from a slide, classify which visual template would BEST represent the content.
  Output ONLY valid JSON with your classification and reasoning.

  ## AVAILABLE TEMPLATES:

  **Data Structures** — select when content describes a specific CS data structure or its operations:
  - linear_chain: linked list, singly linked, doubly linked, chain of nodes, pointer to next, head node, tail node, sequential nodes, node traversal, list traversal, linear sequence of elements, next pointer, prev pointer
  - binary_tree: binary tree, BST, binary search tree, root node, left child, right child, tree traversal, inorder, preorder, postorder, tree height, tree depth, leaf node, parent node, subtree, AVL tree, red-black tree, heap, priority queue, expression tree, decision tree structure
  - general_tree: general tree, n-ary tree, trie, prefix tree, B-tree, B+ tree, file system tree, directory tree, XML tree, DOM tree, organizational hierarchy, parent with multiple children, arbitrary branching
  - stack: stack, LIFO, push operation, pop operation, peek operation, call stack, stack frame, function call stack, undo operation, backtracking, stack overflow, stack underflow, top of stack
  - queue: queue, FIFO, enqueue, dequeue, front of queue, rear of queue, circular queue, deque, double-ended queue, priority queue operations, message queue, job queue, print queue, BFS queue
  - graph: graph, vertices, edges, adjacency matrix, adjacency list, directed graph, undirected graph, weighted graph, DFS, BFS, shortest path, Dijkstra, spanning tree, connected components, topological sort, DAG, cycle detection, bipartite graph

  **Flow Diagrams** — select when content describes processes, algorithms, or repeating patterns:
  - flowchart: algorithm steps, if condition, else branch, while loop logic, for loop logic, decision point, yes/no branch, conditional execution, control flow, procedure steps, sequential process with decisions, input validation, error handling flow, recursive call logic, sorting algorithm steps, search algorithm steps
  - cycle: repeating cycle, circular process, iterative loop, feedback loop, PDCA, software development lifecycle, request-response cycle, event loop, garbage collection cycle, CPU fetch-decode-execute, ping-pong, producer-consumer cycle, retry loop

  **Quantitative** — select when content contains explicit numerical data worth visualizing:
  - bar_chart: numerical comparison, benchmark results, performance comparison, runtime in seconds, memory usage in MB, percentage improvement, N times faster, growth over time, frequency count, histogram data, explicit numbers being compared across categories

  **Architectural** — select when content describes system architecture, model architecture, software layers, or abstraction stacks:
  - architecture_diagram: neural network architecture, transformer architecture, attention mechanism, encoder decoder, LSTM, GRU, ResNet, CNN, convolutional layer, pooling layer, fully connected layer, model architecture, system architecture, microservices, service mesh, pipeline architecture, compiler architecture, database architecture, master slave, pub sub, event driven architecture, component diagram, module dependencies, data flow, feedforward network, backpropagation network, deep learning model, multi-head attention, self-attention, positional encoding, embedding layer, OSI model, TCP/IP layers, operating system layers, kernel user space, hardware abstraction layer, software stack, technology stack, abstraction levels, layer N depends on layer N-1, horizontal layers, application transport network data link physical, MVC layers, three-tier architecture, client server database tier, sits above, built on, abstraction

  **No Visual:**
  - none: ONLY for purely narrative text with zero explanatory or definitional content — chapter introductions, historical background, motivational paragraphs, author commentary, reading passages, transitional sentences, biographical text. If content explains ANYTHING about how something works or what something is, use conceptual instead.

  **Conceptual** — select when content explains, defines, summarizes, or contrasts concepts without describing a specific data structure, process, or system architecture:
  - conceptual: definitions of terms or ideas, concept explanations, summaries of what something is or does, comparisons between two things (pros/cons, versus, trade-offs), analogies mapping technical concepts to real-world scenarios, property descriptions, use case explanations, advantage/disadvantage lists, theoretical background with explanatory intent

  ## SELECTION RULES:
  1. Choose the MOST SPECIFIC template from the list above — the valid labels are: linear_chain, binary_tree, general_tree, stack, queue, graph, flowchart, cycle, bar_chart, architecture_diagram, conceptual, none
  2. Do not output concept_box, comparison, or analogy_diagram — these are not classifier labels
  3. architecture_diagram catches ALL model architectures and system designs — neural networks, transformers, attention mechanisms, LSTM, GRU, ResNet, CNN, encoder-decoder, any ML model with named components, any software system describing how modules connect and communicate. When in doubt between none and architecture_diagram for model-related content, always choose architecture_diagram.
  4. architecture_diagram catches ALL layered abstractions as well — OSI model, OS architecture, software layers, technology stacks, abstraction levels. If content describes components connecting to each other OR layers stacking on top of each other, use architecture_diagram.
  5. Use bar_chart ONLY when explicit numbers or percentages are present in the content — at least two numerical values being compared. A single number mentioned in passing does not qualify. Phrases like "much faster" or "significantly slower" without numbers do not qualify.
  6. none is for purely narrative text with zero visual angle — historical background, motivational paragraphs, course introductions, author commentary, reading passages, abstract definitions with no structural element. Be very conservative — only use none when you genuinely cannot identify any structural, procedural, or architectural element. Content that explains a concept with no inherent data structure, process, or system → none.
  7. flowchart requires decision branching — if the process is strictly linear with no conditions use linear_chain instead
  8. Use architecture_diagram for ANY content describing how a model or system is structured internally — even if you only see a partial description
  9. Distinguish general_tree from architecture_diagram: use general_tree when the tree IS the subject being studied as a CS data structure (trie, B-tree, heap, parse tree). Use architecture_diagram when components of a system or model are connected in a tree-like or graph-like topology (HDFS, transformer layers, microservices). Ask yourself: is this about how the data structure works, or about how a system is designed?
  10. Distinguish linear_chain from flowchart: use linear_chain for strictly linear processes with no conditions (data flows A → B → C). Use flowchart for processes with decision branching and multiple paths (if/else, loops, conditions).
  11. Self-check before answering: Before outputting template_id ask yourself:
    - Have I considered architecture_diagram for any content describing model or system internals?
    - Have I considered architecture_diagram for any content describing abstraction layers or software stacks?
    - Have I considered flowchart for any content describing a process with decisions?
    - Have I considered linear_chain for any strictly sequential process with no branching?
    - Have I considered general_tree for any CS tree data structure being studied algorithmically?
    - Have I considered bar_chart if there are explicit numbers being compared?
    - Have I considered conceptual for content that defines, explains, summarizes, or contrasts any concept?
    - Am I choosing none only for genuinely narrative content with no explanatory element whatsoever?
    - Am I accidentally outputting concept_box, comparison, or analogy_diagram? If yes, reclassify — these are forbidden outputs.
  12. When content contains Python code examples or code snippets demonstrating a data structure or algorithm, classify based on WHAT IS BEING DEMONSTRATED, not the presence of code. Code showing a stack implementation → stack. Code showing a sorting algorithm with conditions → flowchart. Code showing a neural network forward pass → architecture_diagram. Content that is purely code explanation with no demonstrable structure → none.
  13. Use conceptual for ANY content that explains what something is, defines a term, summarizes a concept, contrasts two things, or maps a technical idea to a familiar scenario. When in doubt between conceptual and none, choose conceptual — none is reserved exclusively for narrative text with no educational explanatory content.
  14. Use none ONLY when the content is purely narrative — it tells a story, provides background, introduces a chapter, or provides context without explaining any concept. A single sentence that defines or explains something makes the entire chunk conceptual, not none.

  ## EXAMPLES:

  ### Example 1:
  Bullets: "A stack works like a pile of plates. New items go on top. We always remove from the top first. This is called LIFO — Last In First Out."
  Output: {"template_id": "stack", "reasoning": "Content describes stack data structure with LIFO semantics and push/pop operations"}

  ### Example 2:
  Bullets: "First check if input is valid. If yes, parse the data. If parsing fails, log the error and return. Otherwise store the result and return success."
  Output: {"template_id": "flowchart", "reasoning": "Content describes an algorithm with conditional branching — valid/invalid and success/failure paths"}

  ### Example 3:
  Bullets: "Variables store data in memory. Python uses dynamic typing. The assignment operator binds a name to a value in the current scope."
  Output: {"template_id": "none", "reasoning": "Abstract programming concepts with no specific visual structure — no data structure, no process, no architecture, no quantitative data"}

  ### Example 4:
  Bullets: "Closed-form summation runs in O(1) time. The iterative approach runs in O(n) time. Benchmarks show closed-form is 10x faster on large inputs."
  Output: {"template_id": "bar_chart", "reasoning": "Content contains explicit quantitative performance comparison between two approaches with numerical ratio"}

  ### Example 5:
  Bullets: "The OSI model has 7 layers. Physical layer handles bit transmission. Data link handles framing. Network handles routing. Transport handles end-to-end delivery. Application layer is where user software operates."
  Output: {"template_id": "architecture_diagram", "reasoning": "Content describes clean horizontal abstraction layers stacked vertically — architecture_diagram handles both component diagrams and layered stacks"}

  ### Example 6:
  Bullets: "A transformer consists of an encoder and decoder. The encoder uses multi-head self-attention followed by feed-forward layers. Each sublayer has residual connections and layer normalization. The decoder adds cross-attention over encoder output."
  Output: {"template_id": "architecture_diagram", "reasoning": "Content describes the internal component architecture of a transformer model with specific modules and connections between them"}

  ### Example 7:
  Bullets: "Nodes in a linked list contain a value and a pointer to the next node. The head points to the first node. The last node points to null."
  Output: {"template_id": "linear_chain", "reasoning": "Content describes linked list structure with nodes and next pointers — classic linear chain"}

  ### Example 8:
  Bullets: "The call stack tracks function execution. Each function call pushes a frame. When a function returns its frame is popped. Recursive calls push multiple frames until the base case is reached."
  Output: {"template_id": "stack", "reasoning": "Content describes call stack behavior with push/pop semantics during function execution"}

  ### Example 9:
  Bullets: "A trie stores strings by breaking them into characters. Each node represents one character and can have up to 26 children. All descendants of a node share the same prefix. Searching takes O(m) time where m is the string length."
  Output: {"template_id": "general_tree", "reasoning": "Content describes a trie which is a CS data structure with arbitrary branching — the tree structure is the subject being studied, not a system architecture"}

  ### Example 10:
  Bullets: "The NameNode is the master server in HDFS. It manages the file system namespace and metadata. Multiple DataNodes store the actual data blocks. The NameNode tracks which blocks are on which DataNode and coordinates replication."
  Output: {"template_id": "architecture_diagram", "reasoning": "Content describes system architecture with master and worker components connected by data flow — this is infrastructure design not a CS data structure"}

  ### Example 11:
  Bullets: "A B-tree node contains between t-1 and 2t-1 keys. Each internal node has between t and 2t children. All leaves are at the same depth. B-trees are used in database indexing and file systems."
  Output: {"template_id": "general_tree", "reasoning": "Content describes B-tree as a CS data structure with arbitrary branching factor — studying the tree algorithm itself, not a system design"}

  ### Example 12:
  Bullets: "Machine learning is a branch of artificial intelligence. Models learn from data without being explicitly programmed. Supervised, unsupervised, and reinforcement learning are the three main paradigms."
  Output: {"template_id": "none", "reasoning": "Introductory overview with no specific data structure, process, or architectural content — purely conceptual narrative"}

  ### Example 13 (conceptual — definition):
  Bullets: "A queue is a linear data structure that follows the FIFO principle. Elements are added at the rear and removed from the front. Common applications include print queues and process scheduling."
  Output: {"template_id": "conceptual", "reasoning": "Content defines a concept and explains its properties and applications — text layout enrichment is appropriate, not none"}

  ### Example 14 (none — pure narrative):
  Bullets: "In this chapter we explore several important algorithms. The study of algorithms has a long history dating back to the early days of computer science. Understanding these concepts will prepare you for more advanced topics."
  Output: {"template_id": "none", "reasoning": "Pure introductory narrative with no concept definition or explanation — no visual or text layout adds value"}

classifier_user_template: |
  Classify the following slide content into the best visual template.

  ## BULLET POINTS:
  {bullets_text}

  ## SLIDE TITLE (for context):
  {title}

  ## RULES:
  1. Choose ONLY from these valid labels:
     - Data Structures: linear_chain, binary_tree, general_tree, stack, queue, graph
     - Flow Diagrams: flowchart, cycle
     - Quantitative: bar_chart
     - Architectural: architecture_diagram (neural networks, transformers, system designs, microservices, compiler pipelines, any model/system with components and connections, OSI model, OS architecture, software layers, technology stacks)
     - Conceptual: conceptual (definitions, concept explanations, summaries, comparisons, analogies, property descriptions, use case explanations, advantage/disadvantage lists, theoretical background with explanatory intent)
     - No Visual: none (ONLY purely narrative text — chapter introductions, historical background, motivational text, author commentary, reading passages with no explanatory content)
  2. Do NOT output concept_box, comparison, or analogy_diagram — these are forbidden labels
  3. architecture_diagram covers ALL model and system architectures AND all layered abstractions (OSI, OS stack, software layers)
  4. conceptual covers all content that defines, explains, summarizes, contrasts, or analogizes — when in doubt between conceptual and none, choose conceptual
  5. none covers ONLY purely narrative text with zero explanatory or definitional content
  6. Include brief reasoning for your choice

  Output ONLY the JSON. No explanations outside the JSON.
